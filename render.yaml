# Render.com 部署配置文件
# 文档: https://render.com/docs/yaml-spec

services:
  # Web 服务 (后端 API)
  - type: web
    name: renyuan-api
    runtime: node
    plan: free # 免费套餐
    buildCommand: cd server && npm install
    startCommand: cd server && node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true # 自动生成密钥
      - key: JWT_EXPIRES_IN
        value: "24h"
    # 从环境变量获取数据库 URL（在 Render 控制台设置）
    # DATABASE_URL 将在 Render 中配置 PostgreSQL 时自动注入

  # 注意：首次部署前需要在 Render 控制台：
  # 1. 创建 PostgreSQL 数据库服务
  # 2. 获取 DATABASE_URL
  # 3. 设置环境变量

databases:
  # PostgreSQL 数据库
  - name: renyuan-db
    databaseName: renyuan
    user: renyuan_user
    plan: free # 免费套餐（最多 90 天不活动后休眠）
    # 免费额度：1GB 存储，90 天保留